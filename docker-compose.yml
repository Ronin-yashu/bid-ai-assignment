version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bid-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bidai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d bidai']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
